  api:
    build: .
    container_name: alemeno_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    # depends_on:
    #   redis:
    #     condition: service_started
    env_file:
      - .env

  worker:
    build: .
    container_name: alemeno_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - ./app:/app/app
      - uploads_data:/app/uploads
    # depends_on:
    #   redis:
    #     condition: service_started
    env_file:
      - .env

